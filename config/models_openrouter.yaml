# Same 20-model portfolio as models.yaml, but every model routed through
# OpenRouter (openrouter.ai) -- ONE key (OPENROUTER_API_KEY) instead of ten.
#
#   python main.py --models config/models_openrouter.yaml run
#
# IMPORTANT -- VERIFY EVERY SLUG BEFORE A REAL RUN. OpenRouter model slugs
# follow a `vendor/model` convention but are set by OpenRouter, not derived
# mechanically from the provider's own id: the slugs below were constructed
# from that convention plus the ids in models.yaml and have NOT been checked
# against a live model list (https://openrouter.ai/models) from this
# environment. Any wrong slug fails loudly on the first call (and `--resume`
# lets you rerun just the fixes), but check first -- it's one page to skim.
#
# Methodology note: routing through an intermediary is a (small) change of
# measurement conditions vs. the direct APIs -- OpenRouter may serve a slug
# from different underlying deployments. Each run records the id the endpoint
# echoes back (`returned_model`); use it to confirm what actually answered.
# Keep OpenRouter runs and direct-API runs in separate experiments rather
# than mixing them.
#
# max_tokens rationale mirrors models.yaml: reasoning-capable tiers get 4096
# so hidden reasoning tokens can't silently truncate the reply. (The
# instrument-size floor in the orchestrator still applies on top.)

models:
  # ---- Anthropic (3 sizes) --------------------------------------------
  - name: claude-opus
    provider: openrouter
    model_id: anthropic/claude-opus-4.8  # verify
    enabled: true
    params: { max_tokens: 2048 }

  - name: claude-sonnet
    provider: openrouter
    model_id: anthropic/claude-sonnet-5  # verify
    enabled: true
    params: { max_tokens: 2048 }

