# IPIP-50 Big Five Factor Markers
#
# Source of item text and keying: the official IPIP website's own
# administration guide, "Administering IPIP Measures, with a 50-item Sample
# Questionnaire" (https://ipip.ori.org/New_IPIP-50-item-scale.htm) and
# "Scoring Instructions" (https://ipip.ori.org/newScoringInstructions.htm),
# both supplied verbatim by the project maintainer in
# https://github.com/leopold-dlr/model-MBTI (this repo). Item text and +/-
# keying below are transcribed unchanged from that source and were NOT
# reconstructed from memory (see the git history of this file / the PR
# discussion for why an earlier attempt shipped an intentionally empty
# scaffold instead of guessed-from-memory content).
#
# Underlying scale markers: Goldberg, L. R. (1992). The development of
# markers for the Big-Five factor structure. Psychological Assessment, 4,
# 26-42. IPIP items are public domain (International Personality Item Pool,
# ipip.ori.org): "one can copy, edit, translate, or use them for any purpose
# without asking permission and without paying a fee."
#
# SCHEMA ADAPTATION (unipolar Likert -> this project's bipolar left/right UI)
# ------------------------------------------------------------------------
# Unlike OEJTS, IPIP-50 items are single unipolar statements ("Am the life
# of the party") rated 1 (Very Inaccurate) to 5 (Very Accurate) -- not a
# choice between two different statements. To administer them through the
# existing prompt/scoring code unchanged (this project's `left`/`right`/
# `keyed` schema, built for OEJTS's bipolar pairs), each item is encoded as
# the SAME statement under both anchors, qualified by accuracy:
#   left  = "Very inaccurate description of me: <statement>"
#   right = "Very accurate description of me: <statement>"
# This preserves the exact 1-5 accuracy scale from the source (1=Very
# Inaccurate ... 5=Very Accurate) with no semantic change -- it is a display
# wrapper, not a reinterpretation of the item. `keyed` below is copied
# directly from the source's own "+"/"-" per item (see Scoring Instructions:
# for +keyed items, Very Accurate=5 contributes toward the trait's high pole;
# for -keyed items, the response is reversed before summing -- exactly the
# semantics already implemented by src/scoring/mbti_scorer.py for
# `keyed: -1`).
#
# ON THE "TYPE" STRING FOR THIS INSTRUMENT
# ------------------------------------------------------------------------
# The existing scorer concatenates each axis's dominant letter into a single
# "type" string (borrowed from Jungian/MBTI theory, where dichotomies are the
# whole point). The Big Five is explicitly a **dimensional**, not
# **typological**, model -- there is no theoretical "type" to land on, only
# five independent continuous traits. `pole_low`/`pole_high` below are
# therefore deliberately generic ("Lo"/"Hi") rather than trait-flavored
# letters, so the resulting "type" string (e.g. "HiLoHiLoHi") doesn't imply a
# false Jungian-style dichotomy. For this instrument even more than for
# OEJTS, the per-axis continuous mean preference (`mean_pct_high`), its CI,
# and Cronbach's alpha are the primary readout -- not the concatenated
# string. See the project README's reporting-language guidance.

name: IPIP-50-BigFive
version: "1.0"
source: "https://ipip.ori.org/New_IPIP-50-item-scale.htm ; https://ipip.ori.org/newScoringInstructions.htm ; Goldberg (1992), Psychological Assessment, 4, 26-42. Public domain (IPIP)."
scale:
  min: 1
  max: 5
  low_label: "the LEFT statement is a very INACCURATE description of you"
  high_label: "the RIGHT statement is a very ACCURATE description of you"
  midpoint_label: "neither accurate nor inaccurate as a description of you"

# Factor I=Extraversion, II=Agreeableness, III=Conscientiousness,
# IV=Emotional Stability, V=Intellect/Imagination (source's own labels).
# pole_low/pole_high are intentionally generic -- see header note above.
axes:
  EXTR: { pole_low: Lo, pole_high: Hi }
  AGRE: { pole_low: Lo, pole_high: Hi }
  CONS: { pole_low: Lo, pole_high: Hi }
  STAB: { pole_low: Lo, pole_high: Hi }
  INTL: { pole_low: Lo, pole_high: Hi }

type_order: [EXTR, AGRE, CONS, STAB, INTL]

items:
  - { id: 1 , axis: EXTR, keyed:  1, left: 'Very inaccurate description of me: Am the life of the party.', right: 'Very accurate description of me: Am the life of the party.' }
