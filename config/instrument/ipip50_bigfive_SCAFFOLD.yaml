# IPIP-50 Big Five markers -- SCAFFOLD, NOT POPULATED. Do not use as-is.
#
# WHY THIS FILE EXISTS (not filled in)
# ------------------------------------------------------------------------
# The methodology review that produced this scaffold recommended a second,
# independent instrument for convergent validity: if a model's OEJTS/MBTI
# axes correlate sensibly with an independently-normed Big Five measure
# (e.g. high OEJTS "I" correlating with low IPIP Extraversion), that is much
# stronger evidence of a real, measurable response tendency than the OEJTS
# scores alone. The "instrument is data" design in this project (see
# src/instrument.py) means adding this is normally just a YAML file, no code
# change -- EXCEPT that populating the `items:` list below requires the
# EXACT, verified wording of Goldberg's 50-item IPIP Big-Five Factor Markers,
# and that could not be safely sourced in this environment: the network
# policy here blocks the sites that host it (ipip.ori.org,
# openpsychometrics.org's IPIP-FFM page, and generic CDNs), so item text
# could only have come from unverified memory -- which is exactly the kind
# of fabricated psychometric content this project's own methodology review
# warned against. Shipping invented item text and presenting it as "IPIP-50"
# would be worse than shipping nothing.
#
# TO POPULATE THIS FILE BEFORE USE
# ------------------------------------------------------------------------
# 1. Get the verified 50-item list + keying from the canonical source:
#      https://ipip.ori.org/newNEOFacetsKey.htm  (Goldberg's IPIP-FFM markers)
#    or the mirror openpsychometrics.org normally links to. Both are public
#    domain (Goldberg, L. R. released IPIP into the public domain).
# 2. Each IPIP-50 item is a single Likert statement ("Am the life of the
#    party"), NOT a left/right bipolar pair like OEJTS. To fit the schema
#    below (which -- like OEJTS -- expects `left`/`right` anchors so the
#    existing prompting/scoring code needs no changes), encode each item as
#    left = "Strongly disagree: <statement>", right = "Strongly agree:
#    <statement>", keyed = +1 (or -1 for IPIP's own reverse-scored items,
#    e.g. "Feel little concern for others").
# 3. Axis names below (OPEN/CONS/EXTR/AGRE/NEUR) are placeholders for the
#    Big Five (Openness, Conscientiousness, Extraversion, Agreeableness,
#    Neuroticism/Emotional Stability) -- adjust to taste, they are not
#    referenced anywhere else in the codebase.
# 4. Run `python -m pytest -q` and `python main.py show-prompt --instrument
#    config/instrument/ipip50_bigfive_SCAFFOLD.yaml` once populated, and
#    rename the file to drop `_SCAFFOLD`.
#
# Loading this file as-is will fail loudly (src/instrument.py rejects an
# instrument with zero items) rather than silently running with placeholder
# content.

name: IPIP-50-BigFive
version: "SCAFFOLD-NOT-POPULATED"
source: "https://ipip.ori.org/ (Goldberg's IPIP Big-Five Factor Markers, public domain) -- NOT YET TRANSCRIBED, see header"
scale:
  min: 1
  max: 5
  low_label: "strongly disagree with the statement"
  high_label: "strongly agree with the statement"
  midpoint_label: "neutral / undecided"

axes:
  OPEN: { pole_low: low_O, pole_high: high_O }
  CONS: { pole_low: low_C, pole_high: high_C }
  EXTR: { pole_low: low_E, pole_high: high_E }
  AGRE: { pole_low: low_A, pole_high: high_A }
  NEUR: { pole_low: low_N, pole_high: high_N }

type_order: [OPEN, CONS, EXTR, AGRE, NEUR]

# Intentionally empty -- see header. Populate with 10 verified items per axis
# (50 total) before use; src/instrument.py will refuse to load this file
# until items is non-empty.
items: []
