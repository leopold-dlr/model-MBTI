# Global run settings for the MBTI/OEJTS arena.

# Number of independent runs per model. The central statistic of the study is
# the run-to-run stability of each model's type, so N should be >= a handful.
# Bumped to 20 (from 10) now that the portfolio spans 20 models across 10
# providers with same-family size tiers (e.g. gpt-5 vs gpt-5-mini vs
# gpt-5-nano): more runs per model both tightens the stability estimate and
# gives a better chance of catching a model's occasional "off" answers rather
# than one lucky/unlucky run. With 20 models x 20 runs that's 400 base calls
# (before retries) -- lower this back down for a quick/cheap smoke test.
n_runs: 20

# Test language. OEJTS item text is English; keep "en" for comparability.
language: en

# Administration mode:
#   one-shot : send all 32 items in a single request, expect one JSON reply.
# (Item-by-item mode is intentionally not implemented -- one-shot is cheaper
#  and avoids context drift across 32 turns.)
mode: one-shot

# Present items in a randomized order each run to blunt straight-lining /
# positional bias. Ordering is deterministic given `seed` + model + run index,
# so runs are reproducible. Scoring always uses item ids, never position.
randomize_item_order: true

# Base RNG seed. The per-run seed is derived deterministically from this plus
# the model name and run index.
seed: 42

# Retry policy for malformed / refused responses. On each retry the model is
# re-prompted with an explicit reminder of the JSON schema and the
# "answer as yourself" instruction. After max_retries, the run is stored as
# invalid (the refusal is itself a data point) rather than fabricating scores.
max_retries: 3

# Separate retry budget for transient API failures (network errors, rate
# limits, 5xx) -- NOT counted against max_retries and no reminder is added,
# since these are infrastructure noise, not model behavior. Conflating the two
# would make a provider's rate limiting look like a model "refusal".
max_provider_retries: 5

# Minimum valid runs (per model x condition) required before a stability
# figure is treated as reliable in reports; below this, tables/paper flag the
# number as low-confidence rather than silently reporting it at face value.
min_valid_runs: 10

# Temperature conditions to run each model x n_runs under. "default" (value:
# null) sends no temperature override, i.e. the provider's own default --
# this is what the headline "does this model have a personality" table uses.
# Providers differ in their default temperature, which is a confound for the
# STABILITY comparison across models/providers (more sampling entropy alone
# produces more type-flipping, independent of any real trait). The second,
# fixed-temperature condition removes that confound: use it, not "default",
# whenever comparing stability ACROSS models. Add/remove entries here; each
# one multiplies the number of API calls by n_runs.
temperature_conditions:
  - label: default
    value: null
  - label: fixed_t1
    value: 1.0

# Named system-prompt framings to run (see src/prompting/templates.py
# SYSTEM_PROMPTS). Left as a single entry by default so cost is unchanged;
# add "as_ai_explicit" and/or "no_meta_mention" to run a prompt-wording
# ablation (each entry again multiplies the call count by n_runs).
prompt_variants:
  - default

# Where raw per-run JSON is written.
output_dir: data/runs

# Where aggregated reports / dashboards are written.
report_dir: reports

# Concurrency: how many model API calls to run in parallel. Bumped from 4 to 8
# since load is now spread across 10 distinct providers (each with its own
# rate limit) rather than concentrated on a handful -- but a burst can still
# land several calls on the same provider at once, so raise cautiously if you
# hit 429s.
max_concurrency: 8
